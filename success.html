<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanks for reaching out — Keiracom</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .card {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 56px 48px;
            max-width: 560px;
            width: 100%;
            text-align: center;
        }

        .mark {
            font-size: 3rem;
            margin-bottom: 24px;
            display: block;
        }

        h1 {
            color: white;
            font-size: 1.9rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        p {
            color: #94a3b8;
            line-height: 1.7;
            margin-bottom: 16px;
            font-size: 1rem;
        }

        .email-link {
            color: #10B981;
            text-decoration: none;
        }

        .email-link:hover {
            text-decoration: underline;
        }

        .home-link {
            display: inline-block;
            margin-top: 32px;
            background: #10B981;
            color: white;
            padding: 13px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: transform 0.2s ease;
        }

        .home-link:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="mark">✓</span>
        <h1>Thanks for reaching out.</h1>
        <p>We'll get back to you directly. No auto-responder, no sales sequence — just a reply from a human.</p>
        <p>In the meantime, email us at <a href="mailto:david.stephens@keiracom.com" class="email-link">david.stephens@keiracom.com</a> if you have something specific to share.</p>
        <a href="/" class="home-link">Back to Keiracom</a>
    </div>
</body>
</html>
